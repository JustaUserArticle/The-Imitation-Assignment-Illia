<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>The Imitation Assignment</title>
    <style>
        body {
            background-color: #e9e9e9;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 40px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .project {
            background: white;
            padding: 10px;
            border: 1px solid #ccc;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .penguins {
            width: 280px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .field-container {
            width: 280px;
            height: 180px;
            background: url('football_field.jpg') no-repeat center/cover;
            filter: grayscale(1); 
            position: relative;
        }

        .tic-tac-toe-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('tic-tac-toe.png') no-repeat center/contain;
        }

        .dino {
            width: 200px;
            filter: hue-rotate(200deg);
        }

        .bird {
            width: 240px;
            transform: scaleX(-1);
        }

        .butterfly {
            width: 260px;
            filter: invert(1);
        }

        .theater-box {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #cc0000 0%, #440000 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 10px solid #222;
        }

        .theater-box span {
            color: white;
            font-size: 26px;
            font-family: sans-serif;
            font-weight: bold;
            text-shadow: 2px 2px 10px black;
        }
    </style>
</head>
<body>

    <div class="project">
        <img src="penguins.jpg" class="penguins">
    </div>

    <div class="project">
        <div class="field-container">
            <div class="tic-tac-toe-layer"></div>
        </div>
    </div>

    <div class="project">
        <img src="dinosaur.png" class="dino">
    </div>

    <div class="project">
        <img src="seagull.png" class="bird">
    </div>

    <div class="project">
        <img src="butterfly.jpg" class="butterfly">
    </div>

    <div class="project">
        <div class="theater-box">
            <span>Presenting</span>
        </div>
    </div>

</body>
</html>
