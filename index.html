<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>The Imitation Assignment</title>
    <style>
        body {
            background-color: #e9e9e9;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 40px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .project {
            background: white;
            border: 1px solid #ccc;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .penguins {
            width: 260px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            filter: sepia(0.8) saturate(2) brightness(1.1);
        }

        .field-container {
            width: 280px;
            height: 180px;
            border: 25px solid transparent;
            border-image: url('tic-tac-toe.png') 33% round;
            box-sizing: border-box;
        }

        .field-inside {
            width: 100%;
            height: 100%;
            background: url('football_field.jpg') no-repeat center/cover;
            filter: grayscale(1);
        }

        .dino {
            width: 180px;
            filter: hue-rotate(190deg) brightness(1.1) drop-shadow(10px 10px 5px rgba(0,0,0,0.3));
        }

        .bird-bg {
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #cfd9df, #e2ebf0);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bird-bg img {
            width: 220px;
            filter: drop-shadow(0 15px 10px rgba(0,0,0,0.3));
        }

        .butterfly-box {
            width: 280px;
            height: 180px;
            border-radius: 80px 0 80px 0;
            overflow: hidden;
        }

        .butterfly-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: invert(1);
        }

        .theater-stage {
            width: 100%;
            height: 100%;
            background: url('theater_stage.jpg') no-repeat center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theater-stage span {
            color: white;
            font-size: 24px;
            font-family: sans-serif;
            font-weight: bold;
            text-shadow: 2px 2px 10px #000;
        }
    </style>
</head>
<body>

    <div class="project">
        <img src="penguins.jpg" class="penguins">
    </div>

    <div class="project">
        <div class="field-container">
            <div class="field-inside"></div>
        </div>
    </div>

    <div class="project">
        <img src="dinosaur.png" class="dino">
    </div>

    <div class="project">
        <div class="bird-bg">
            <img src="seagull.png">
        </div>
    </div>

    <div class="project">
        <div class="butterfly-box">
            <img src="butterfly.jpg">
        </div>
    </div>

    <div class="project">
        <div class="theater-stage">
            <span>Presenting</span>
        </div>
    </div>

</body>
</html>
