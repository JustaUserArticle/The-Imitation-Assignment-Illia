<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>The Imitation Assignment</title>
    <style>
        body {
            background-color: #e9e9e9;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 40px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .project {
            background: white;
            padding: 10px;
            border: 1px solid #ccc;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .penguins {
            width: 280px;
            border-radius: 50%;
            border: 1px solid #ccc;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.2);
        }

        .field-container {
            width: 280px;
            height: 180px;
            background: url('football_field.jpg') no-repeat center/cover;
            filter: grayscale(1);
            transform: rotate(180deg);
            position: relative;
        }

        .tic-tac-toe-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('tic-tac-toe.png') no-repeat center/contain;
        }

        .dino {
            width: 200px;
            filter: hue-rotate(200deg) drop-shadow(8px 8px 5px rgba(0,0,0,0.5));
        }

        .bird-box {
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #dcd0ff, #ffffff);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bird-box img {
            width: 240px;
            box-shadow: 5px 5px 10px rgba(0,0,0,0.2);
        }

        .butterfly-box {
            width: 280px;
            height: 180px;
            border-radius: 50px 0 50px 0;
            overflow: hidden;
        }

        .butterfly-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: saturate(1.5) brightness(1.1);
        }

        .theater-box {
            width: 100%;
            height: 100%;
            background: url('theater_stage.jpg') no-repeat center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 5px solid #333;
        }

        .theater-box span {
            color: white;
            font-size: 24px;
            font-weight: bold;
            font-family: sans-serif;
            text-shadow: 2px 2px 5px black;
        }
    </style>
</head>
<body>

    <div class="project">
        <img src="penguins.jpg" class="penguins">
    </div>

    <div class="project">
        <div class="field-container">
            <div class="tic-tac-toe-layer"></div>
        </div>
    </div>

    <div class="project">
        <img src="dinosaur.png" class="dino">
    </div>

    <div class="project">
        <div class="bird-box">
            <img src="seagull.png">
        </div>
    </div>

    <div class="project">
        <div class="butterfly-box">
            <img src="butterfly.jpg">
        </div>
    </div>

    <div class="project">
        <div class="theater-box">
            <span>Presenting</span>
        </div>
    </div>

</body>
</html>
