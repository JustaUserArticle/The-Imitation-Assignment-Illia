<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>The Imitation Assignment</title>
    <style>
        body {
            background-color: #e9e9e9;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 40px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .project {
            background: white;
            padding: 10px;
            border: 1px solid #ccc;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .penguins {
            width: 280px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #999;
            filter: sepia(0.3) brightness(1.1);
        }

        .field-border {
            width: 280px;
            height: 180px;
            border: 20px solid white;
            border-image: url('tic-tac-toe.png') 33% round;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: white;
        }

        .field-container {
            width: 100%;
            height: 100%;
            background: url('football_field.jpg') no-repeat center/cover;
            filter: grayscale(1) brightness(0.7);
        }

        .dino {
            width: 200px;
            filter: hue-rotate(200deg) drop-shadow(10px 10px 5px rgba(0,0,0,0.4));
        }

        .bird-box {
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #b0c4de, #ffffff);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bird-box img {
            width: 240px;
            filter: drop-shadow(0 10px 5px rgba(0,0,0,0.2));
        }

        .butterfly-box {
            width: 280px;
            height: 180px;
            border-radius: 60px 0 60px 0;
            overflow: hidden;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
        }

        .butterfly-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: hue-rotate(180deg) saturate(1.5);
        }

        .theater-box {
            width: 100%;
            height: 100%;
            background: url('theater_stage.jpg') no-repeat center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 5px solid #222;
        }

        .theater-box span {
            color: white;
            font-size: 26px;
            font-weight: bold;
            font-family: Arial, sans-serif;
            text-shadow: 2px 2px 8px black;
        }
    </style>
</head>
<body>

    <div class="project">
        <img src="penguins.jpg" class="penguins">
    </div>

    <div class="project">
        <div class="field-border">
            <div class="field-container"></div>
        </div>
    </div>

    <div class="project">
        <img src="dinosaur.png" class="dino">
    </div>

    <div class="project">
        <div class="bird-box">
            <img src="seagull.png">
        </div>
    </div>

    <div class="project">
        <div class="butterfly-box">
            <img src="butterfly.jpg">
        </div>
    </div>

    <div class="project">
        <div class="theater-box">
            <span>Presenting</span>
        </div>
    </div>

</body>
</html>
